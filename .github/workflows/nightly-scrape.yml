name: Nightly scrape

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Polsia sources
        run: python scripts/sync_polsia_sources.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: nightly Polsia docs sync"
          file_pattern: |
            references/upstream/**
